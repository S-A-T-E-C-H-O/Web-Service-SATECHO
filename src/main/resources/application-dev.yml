spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: com.satecho.agrosafe.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: jdbc:postgresql://localhost:5433/agrosafe_dev
    username: agrosafe_user
    password: agrosafe_pass

  rabbitmq:
    host: localhost
    port: 5672

  redis:
    data:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.agrosafe: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
